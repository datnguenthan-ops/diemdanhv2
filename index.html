<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự Kiện - Xác Nhận Có Mặt</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #f43f5e;
            --success: #10b981;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-30%, -30%);
            }

            to {
                transform: translate(30%, 30%);
            }
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: all 0.5s ease;
        }

        .logo-ring {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            font-size: 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Form elements */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .pin-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .pin-box {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            padding: 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border-radius: 16px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: none;
            border: 1px solid var(--glass-border);
        }

        .sgn-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            text-align: left;
        }

        .sgn-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* SUCCESS HUB */
        .success-hub {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-check {
            width: 64px;
            height: 64px;
            background: var(--success);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
        }

        .hub-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 24px;
        }

        .hub-tab {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
        }

        .hub-tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-pane {
            display: none;
            text-align: left;
        }

        .tab-pane.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .seat-info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .seat-badge {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-light);
            margin: 8px 0;
        }

        .map-box {
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin: 0 auto;
            width: fit-content;
        }

        .map-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.08);
            margin: 1px;
        }

        .map-dot.active {
            background: var(--primary);
            transform: scale(2);
            box-shadow: 0 0 10px var(--primary);
            z-index: 5;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .doc-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 12px;
            text-decoration: none;
            color: inherit;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .doc-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .doc-icon {
            font-size: 24px;
        }

        .agenda-list {
            list-style: none;
        }

        .agenda-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
        }

        .agenda-time {
            font-weight: 700;
            color: var(--primary-light);
            min-width: 60px;
        }

        #loading-text {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="blob"></div>
    <div class="container">
        <!-- STEP: PIN -->
        <div class="card" id="step-pin">
            <div class="logo-ring">🔐</div>
            <h1>Xác Minh Truy Cập</h1>
            <p class="subtitle">Vui lòng nhập mã sự kiện được cung cấp</p>
            <div class="pin-container">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" onkeyup="moveFocus(this, 0)">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" onkeyup="moveFocus(this, 1)">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" onkeyup="moveFocus(this, 2)">
                <input type="password" class="pin-box" maxlength="1" inputmode="numeric" onkeyup="moveFocus(this, 3)">
            </div>
            <button class="btn btn-primary" onclick="verifyPin()">Vào Hệ Thống</button>
        </div>

        <!-- STEP: SEARCH -->
        <div class="card" id="step-search" style="display: none;">
            <div class="logo-ring">👋</div>
            <h1 id="meeting-name">Xin Chào!</h1>
            <p class="subtitle">Tìm tên bạn trong danh sách để nhận vé ngồi</p>
            <div class="input-group">
                <input type="text" id="query" placeholder="Gõ tên của bạn..." oninput="searchDebounced()"
                    autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div id="loading-text">🔍 Đang kiểm tra danh sách...</div>
            <div id="confirm-box" style="display: none; margin-top: 25px;">
                <div
                    style="background: rgba(99, 102, 241, 0.1); padding: 20px; border-radius: 16px; margin-bottom: 20px;">
                    <h3 id="target-name" style="font-size: 18px;"></h3>
                    <p id="target-unit" style="color: var(--text-muted); font-size: 13px;"></p>
                </div>
                <button class="btn btn-primary" onclick="confirmCheckin()" id="btn-checkin">⚡️ Xác Nhận Có Mặt</button>
            </div>
        </div>

        <!-- SUCCESS HUB -->
        <div class="card success-hub" id="step-success">
            <div class="icon-check">✓</div>
            <h2 id="welcome-msg" style="margin-bottom: 20px;"></h2>

            <div class="hub-tabs">
                <div class="hub-tab active" onclick="switchHubTab('hub-map', this)">📍 Vị trí</div>
                <div class="hub-tab" onclick="switchHubTab('hub-docs', this)">📚 Tài liệu</div>
                <div class="hub-tab" onclick="switchHubTab('hub-agenda', this)">📅 Lịch trình</div>
            </div>

            <div id="hub-map" class="tab-pane active">
                <div class="seat-info-box">
                    <p style="font-size: 12px; color: var(--text-muted);">SƠ ĐỒ CHỖ NGỒI</p>
                    <div class="seat-badge" id="seat-location"></div>
                    <div class="map-box">
                        <div style="font-size:8px; color:var(--text-muted); margin-bottom:10px;">— SÂN KHẤU —</div>
                        <div style="display: flex; gap: 15px;" id="mini-map"></div>
                    </div>
                </div>
            </div>

            <div id="hub-docs" class="tab-pane">
                <div id="docs-list">
                    <a href="#" id="link-docs" class="doc-item" target="_blank">
                        <div class="doc-icon">📂</div>
                        <div style="text-align: left;">
                            <div style="font-weight: 700;">Thư mục Tài liệu</div>
                            <div style="font-size: 12px; color: var(--text-muted);">Tài liệu, slide hội nghị</div>
                        </div>
                    </a>
                    <a href="#" id="link-feedback" class="doc-item" target="_blank">
                        <div class="doc-icon">📝</div>
                        <div style="text-align: left;">
                            <div style="font-weight: 700;">Phiếu khảo sát</div>
                            <div style="font-size: 12px; color: var(--text-muted);">Gửi góp ý về sự kiện</div>
                        </div>
                    </a>
                </div>
            </div>

            <div id="hub-agenda" class="tab-pane">
                <div class="agenda-list" id="agenda-display"></div>
            </div>

            <button class="btn"
                style="background:transparent; color:var(--text-muted); text-decoration:underline; font-size:13px; margin-top:20px;"
                onclick="location.reload()">Khách tiếp theo</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjLd6_qr-mCZhccLJglu9lNAkAXb-VMwQuHfgM4PNQJcUVwQQ6R0j7svColnuBBqmn/exec';
        let currentPin = '', selectedGuest = null, searchTimer = null, eventData = null;

        function moveFocus(el, i) {
            if (el.value.length === 1 && i < 3) document.querySelectorAll('.pin-box')[i + 1].focus();
        }

        function verifyPin() {
            currentPin = Array.from(document.querySelectorAll('.pin-box')).map(i => i.value).join('');
            if (currentPin.length === 4) {
                document.getElementById('step-pin').style.display = 'none';
                document.getElementById('step-search').style.display = 'block';
                document.getElementById('query').focus();
            }
        }

        function switchHubTab(id, el) {
            document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.hub-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function searchDebounced() {
            clearTimeout(searchTimer);
            const q = document.getElementById('query').value.trim();
            if (q.length < 2) return document.getElementById('suggestions').style.display = 'none';

            searchTimer = setTimeout(async () => {
                document.getElementById('loading-text').style.display = 'block';
                try {
                    const res = await fetch(`${SCRIPT_URL}?mode=search&pin=${currentPin}&q=${encodeURIComponent(q)}`);
                    const json = await res.json();
                    if (json.status === 'success') {
                        eventData = json.event;
                        if (eventData.meeting_title) document.getElementById('meeting-name').innerText = eventData.meeting_title;
                        renderSuggestions(json.data);
                    } else { alert(json.message); location.reload(); }
                } catch (e) { console.error(e); }
                document.getElementById('loading-text').style.display = 'none';
            }, 600);
        }

        function renderSuggestions(data) {
            const s = document.getElementById('suggestions');
            s.innerHTML = data.length ? '' : '<div style="padding:15px;color:var(--text-muted)">Không tìm thấy kết quả</div>';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sgn-item';
                div.innerHTML = `<strong>${item['Họ và tên']}</strong><small style="color:var(--text-muted)">${item['Đơn vị'] || ''}</small>`;
                div.onclick = () => selectItem(item);
                s.appendChild(div);
            });
            s.style.display = 'block';
        }

        function selectItem(item) {
            selectedGuest = item;
            document.getElementById('query').value = item['Họ và tên'];
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('target-name').innerText = item['Họ và tên'];
            document.getElementById('target-unit').innerText = item['Đơn vị'] || 'Đại biểu';
            document.getElementById('confirm-box').style.display = 'block';
        }

        async function confirmCheckin() {
            const btn = document.getElementById('btn-checkin');
            btn.disabled = true; btn.innerText = 'Đang xử lý...';
            const time = new Date().toLocaleTimeString('vi-VN');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ action: 'checkin', uid: selectedGuest['UID'], time: time })
                });
                showHub(time);
            } catch (e) { alert('Lỗi kết nối'); btn.disabled = false; }
        }

        function showHub(time) {
            document.getElementById('step-search').style.display = 'none';
            const isVip = selectedGuest['VIP'] === 'VIP';
            document.getElementById('welcome-msg').innerText = isVip ? `Trân trọng kính mời Đại biểu ${selectedGuest['Họ và tên']}` : `Chào mừng ${selectedGuest['Họ và tên']}`;
            document.getElementById('seat-location').innerText = `Dãy ${selectedGuest['Dãy']} - Hàng ${selectedGuest['Hàng']} - Cột ${selectedGuest['Cột']}`;

            // Docs & Feedback
            const docL = document.getElementById('link-docs');
            if (eventData.doc_link) docL.href = eventData.doc_link; else docL.style.display = 'none';
            const feedL = document.getElementById('link-feedback');
            if (eventData.feedback_link) feedL.href = eventData.feedback_link; else feedL.style.display = 'none';

            // Agenda
            const agD = document.getElementById('agenda-display');
            agD.innerHTML = eventData.agenda ? eventData.agenda.split('\n').map(line => `<div class="agenda-item">${line}</div>`).join('') : 'Chưa cập nhật chương trình';

            renderMiniMap(selectedGuest['Dãy'], selectedGuest['Cột'], selectedGuest['Hàng']);
            document.getElementById('step-success').style.display = 'block';
        }

        function renderMiniMap(block, col, row) {
            const container = document.getElementById('mini-map');
            container.innerHTML = '';
            ['Trái', 'Phải'].forEach(bName => {
                const bDiv = document.createElement('div');
                bDiv.style.display = 'flex'; bDiv.style.flexDirection = 'column';
                for (let r = 1; r <= 10; r++) {
                    const rDiv = document.createElement('div');
                    rDiv.style.display = 'flex';
                    for (let c = 1; c <= 3; c++) {
                        const d = document.createElement('div');
                        d.className = 'map-dot';
                        if (block === bName && r == row && c == col) d.classList.add('active');
                        rDiv.appendChild(d);
                    }
                    bDiv.appendChild(rDiv);
                }
                container.appendChild(bDiv);
            });
        }
    </script>
</body>

</html>
